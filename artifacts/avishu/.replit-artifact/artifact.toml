kind = "web"
previewPath = "/"
title = "AVISHU"
version = "1.0.0"
id = "artifacts/avishu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20397

[services.development]
run = "pnpm --filter @workspace/avishu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/avishu", "run", "build" ]
publicDir = "artifacts/avishu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20397"
BASE_PATH = "/"
